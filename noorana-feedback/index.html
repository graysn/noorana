<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — Noorana</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="site-nav">
  <div class="nav-wrap">
    <a href="index.html" class="nav-brand">
      <div class="nav-mark">N</div>
      noorana
    </a>
    <div class="nav-links">
      <a href="index.html" class="active">Feedback</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="changelog.html">Changelog</a>
    </div>
    <div class="nav-right">
      <input type="search" class="nav-search" id="search-input" placeholder="Search feedback…" oninput="setSearchAndRender(this.value)">
    </div>
  </div>
</nav>

<div class="board-layout">

  <!-- ── MAIN ── -->
  <div class="board-main">
    <div class="board-controls-row">
      <div class="filter-tabs" id="filter-tabs"></div>
      <select class="sort-select" id="sort-select" onchange="setSortAndRender(this.value)">
        <option value="top">↑ Top</option>
        <option value="new">Newest</option>
      </select>
    </div>
    <div id="feedback-list"></div>
  </div>

  <!-- ── SIDEBAR ── -->
  <aside class="board-sidebar">
    <button class="btn btn-primary sidebar-cta" onclick="openSubmit()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Give Feedback
    </button>

    <div class="sidebar-card">
      <div class="sidebar-section-label">Status</div>
      <div id="sidebar-filters"></div>
    </div>
  </aside>

</div>

<footer class="site-footer">
  <a href="admin.html" class="footer-admin-link">Admin</a>
</footer>

<!-- Submit Modal -->
<div class="overlay" id="submit-overlay" onclick="maybeCloseSubmit(event)">
  <div class="modal">
    <div class="modal-head">
      <h2>Submit Feedback</h2>
      <button class="modal-x" onclick="closeSubmit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="label">Title <span class="req">*</span></label>
        <input class="input" id="fb-title" type="text" placeholder="Brief summary of your idea or request" maxlength="120">
      </div>
      <div class="field">
        <label class="label">Type <span class="req">*</span></label>
        <div class="label-picker" id="label-picker">
          <button type="button" class="label-pick-btn label-pick-bug"     data-label="bug"      onclick="pickLabel('bug')">Bug</button>
          <button type="button" class="label-pick-btn label-pick-feature"  data-label="feature"  onclick="pickLabel('feature')">Feature</button>
          <button type="button" class="label-pick-btn label-pick-question" data-label="question" onclick="pickLabel('question')">Question</button>
          <button type="button" class="label-pick-btn label-pick-request"  data-label="request"  onclick="pickLabel('request')">Request</button>
        </div>
      </div>
      <div class="field">
        <label class="label">Description</label>
        <textarea class="textarea" id="fb-desc" placeholder="Describe your idea in more detail…" style="min-height:90px"></textarea>
      </div>
      <div class="field">
        <label class="label">Your email <span class="req">*</span></label>
        <input class="input" id="fb-email" type="email" placeholder="you@school.com">
        <span class="hint">We'll notify you when your request is updated. Not shown publicly.</span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeSubmit()">Cancel</button>
      <button class="btn btn-primary" onclick="submitFeedback()">Submit Feedback</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detail-overlay" onclick="maybeCloseDetail(event)">
  <div class="modal detail-modal" id="detail-drawer"></div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toasts"></div>

<script>
// ── SEED DATA ─────────────────────────────────────────────────────────
const SEED = {
  feedback: [
    { id:'f1', title:'Parent daily reports with photos', description:"Would love to be able to send parents a daily snapshot of their child's activities, including photos taken throughout the day. This would strengthen parent engagement significantly.", email:'sarah.johnson@mountainviewmontessori.edu', status:'now', label:'feature', votes:31, voters:[], createdAt:'2026-02-20T10:30:00Z', adminResponse:null },
    { id:'f2', title:'Bulk student enrollment via CSV import', description:'At the start of each school year, we need to enroll dozens of students. A CSV import feature would save our administrative team hours of manual data entry.', email:'director@sunrisemontessori.com', status:'next', label:'request', votes:18, voters:[], createdAt:'2026-02-15T14:22:00Z', adminResponse:null },
    { id:'f3', title:'QuickBooks integration for tuition invoicing', description:'Our finance team uses QuickBooks. Having Noorana sync tuition payments and invoices directly would eliminate double-entry errors and save time every month.', email:'admin@littlelearnersschool.org', status:'exploring', label:'feature', votes:24, voters:[], createdAt:'2026-02-10T09:15:00Z', adminResponse:null },
    { id:'f4', title:'Multi-language support for the parent portal', description:'Many of our families speak languages other than English at home. Spanish and Mandarin would be a great start for our diverse community.', email:'info@terraemontessori.com', status:'shipped', label:'request', votes:45, voters:[], createdAt:'2026-01-05T11:00:00Z', adminResponse:"We're thrilled to announce that multi-language support has shipped! Spanish, Mandarin, French, and Arabic are now available in the parent portal settings." },
    { id:'f5', title:'Customizable lesson plan templates', description:'Our teachers spend a lot of time formatting lesson plans from scratch each week. Pre-built Montessori-aligned templates with customizable fields would be a huge time saver.', email:'teacher@harmonymontessori.edu', status:'exploring', label:'feature', votes:11, voters:[], createdAt:'2026-03-01T16:45:00Z', adminResponse:null },
    { id:'f6', title:'Attendance report shows wrong count for split classrooms', description:'When a student is enrolled in two classrooms, they appear in the attendance count twice, inflating the total headcount.', email:'admin@cloverdaleacademy.org', status:'now', label:'bug', votes:9, voters:[], createdAt:'2026-03-05T08:00:00Z', adminResponse:null },
    { id:'f7', title:'How do I export the annual progress report?', description:"I can't find where to download the end-of-year progress report PDF for my class. Is this available yet?", email:'ms.chen@birchwoodmontessori.edu', status:'exploring', label:'question', votes:4, voters:[], createdAt:'2026-03-07T13:20:00Z', adminResponse:null },
  ]
};

// ── STORAGE ────────────────────────────────────────────────────────────
function getFeedback() {
  const raw = localStorage.getItem('noorana_feedback');
  return raw ? JSON.parse(raw) : null;
}
function saveFeedback(arr) { localStorage.setItem('noorana_feedback', JSON.stringify(arr)); }
function initData() { if (!getFeedback()) saveFeedback(SEED.feedback); }
function getVoterId() {
  let id = localStorage.getItem('noorana_voter_id');
  if (!id) { id = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); localStorage.setItem('noorana_voter_id', id); }
  return id;
}

// ── STATE ──────────────────────────────────────────────────────────────
let activeLabel  = 'all';
let activeStatus = 'all';
let activeSort   = 'top';
let searchQuery  = '';

// ── LABELS & STATUSES ──────────────────────────────────────────────────
const LABELS = [
  { key:'all',      label:'All' },
  { key:'bug',      label:'Bug' },
  { key:'feature',  label:'Feature' },
  { key:'question', label:'Question' },
  { key:'request',  label:'Request' },
];

const STATUSES = [
  { key:'all',       label:'All' },
  { key:'exploring', label:'Exploring' },
  { key:'next',      label:'Next' },
  { key:'now',       label:'Now' },
  { key:'shipped',   label:'Shipped' },
];

const DOT_COLORS = { all:'var(--muted)', exploring:'#2a9d8f', next:'#e9a84c', now:'#f4a261', shipped:'#2e7d6e' };

function renderFilterTabs() {
  const data = getFeedback().filter(f => !f.archived);
  const tabEl  = document.getElementById('filter-tabs');
  const sideEl = document.getElementById('sidebar-filters');

  // Label tabs across the top
  tabEl.innerHTML = LABELS.map(l => {
    const count = l.key === 'all' ? data.length : data.filter(x => x.label === l.key).length;
    const active = activeLabel === l.key ? ' active' : '';
    return `<button class="filter-tab${active}" onclick="setLabelAndRender('${l.key}')">
      ${l.key !== 'all' ? `<span class="label-dot label-dot-${l.key}"></span>` : ''}
      ${l.label} <span class="filter-count">${count}</span>
    </button>`;
  }).join('');

  // Status filters in sidebar
  sideEl.innerHTML = STATUSES.map(s => {
    const count = s.key === 'all' ? data.length : data.filter(x => x.status === s.key).length;
    const active = activeStatus === s.key ? ' active' : '';
    return `<button class="sidebar-filter-item${active}" onclick="setStatusAndRender('${s.key}')">
      <span class="status-dot dot-${s.key}"></span>
      <span>${s.label}</span>
      <span class="sidebar-filter-count">${count}</span>
    </button>`;
  }).join('');
}

function setLabelAndRender(key)  { activeLabel = key;  render(); }
function setStatusAndRender(key) { activeStatus = key; render(); }
function setSortAndRender(val)   { activeSort = val;   render(); }
function setSearchAndRender(val) { searchQuery = val.trim().toLowerCase(); render(); }

// ── HELPERS ────────────────────────────────────────────────────────────
function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function statusLabel(s) {
  return { 'exploring':'Exploring', 'next':'Next', 'now':'Now', 'shipped':'Shipped', 'closed':'Closed',
           'under-review':'Exploring', 'planned':'Next', 'in-progress':'Now' }[s] || s;
}
function migrateStatuses() {
  const map = { 'under-review':'exploring', 'planned':'next', 'in-progress':'now', 'closed':'shipped' };
  const raw = localStorage.getItem('noorana_feedback');
  if (!raw) return;
  const data = JSON.parse(raw);
  let changed = false;
  data.forEach(f => { if (map[f.status]) { f.status = map[f.status]; changed = true; } });
  if (changed) localStorage.setItem('noorana_feedback', JSON.stringify(data));
}
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const AVATAR_COLORS = ['#e8956d','#5e9fc2','#6ab07a','#b882b8','#d49240','#5eaab0','#c47b8a','#8a7ec5'];
const HEART_SVG = `<svg class="heart-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>`;

// ── RENDER LIST ────────────────────────────────────────────────────────
function render() {
  renderFilterTabs();
  const voterId = getVoterId();
  let data = getFeedback().filter(f => !f.archived);

  if (activeLabel  !== 'all') data = data.filter(f => f.label  === activeLabel);
  if (activeStatus !== 'all') data = data.filter(f => f.status === activeStatus);
  if (searchQuery) data = data.filter(f =>
    f.title.toLowerCase().includes(searchQuery) ||
    (f.description||'').toLowerCase().includes(searchQuery)
  );
  if (activeSort === 'top') data.sort((a,b) => b.votes - a.votes);
  else data.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  const el = document.getElementById('feedback-list');
  if (!data.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">💡</div><h3>No feedback found</h3><p>${searchQuery ? 'Try a different search term.' : 'Be the first to submit a request!'}</p></div>`;
    return;
  }

  el.innerHTML = data.map(f => {
    const voted = f.voters.includes(voterId);
    const initial = (f.email || f.title || '?')[0].toUpperCase();
    const colorIdx = (f.email || 'a').charCodeAt(0) % AVATAR_COLORS.length;
    const emailDisplay = f.email ? escHtml(f.email.split('@')[0].replace(/[._]/g,' ')) : 'Anonymous';
    return `<div class="fb-row" onclick="openDetail('${f.id}')">
      <div class="fb-avatar-circle" style="background:${AVATAR_COLORS[colorIdx]}">${initial}</div>
      <div class="fb-row-inner">
        <div class="fb-row-byline">${emailDisplay} <span class="fb-row-dot">·</span> ${formatDate(f.createdAt)}</div>
        <div class="fb-row-title">${escHtml(f.title)}</div>
        ${f.description ? `<div class="fb-row-desc">${escHtml(f.description)}</div>` : ''}
        <div class="fb-row-foot">
          ${f.label ? `<span class="label-pill label-pill-${f.label}">${f.label}</span>` : ''}
          <span class="fb-status-pill">
            <span class="status-dot dot-${f.status}"></span>
            ${statusLabel(f.status)}
          </span>
          <button class="vote-btn${voted?' voted':''}" onclick="event.stopPropagation();toggleVote('${f.id}')">
            ${HEART_SVG}
            <span class="count">${f.votes}</span>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── VOTE ───────────────────────────────────────────────────────────────
function toggleVote(id) {
  const voterId = getVoterId();
  const data = getFeedback();
  const item = data.find(f => f.id === id);
  if (!item) return;
  const idx = item.voters.indexOf(voterId);
  if (idx === -1) { item.voters.push(voterId); item.votes++; }
  else            { item.voters.splice(idx, 1); item.votes--; }
  saveFeedback(data);
  render();
  if (document.getElementById('detail-overlay').classList.contains('open')) openDetail(id);
}

// ── SUBMIT MODAL ───────────────────────────────────────────────────────
let selectedLabel = '';

function pickLabel(key) {
  selectedLabel = key;
  document.querySelectorAll('.label-pick-btn').forEach(b => b.classList.toggle('selected', b.dataset.label === key));
}
function openSubmit() {
  document.getElementById('submit-overlay').classList.add('open');
  document.getElementById('fb-title').focus();
}
function closeSubmit() {
  document.getElementById('submit-overlay').classList.remove('open');
  ['fb-title','fb-desc','fb-email'].forEach(id => document.getElementById(id).value = '');
  selectedLabel = '';
  document.querySelectorAll('.label-pick-btn').forEach(b => b.classList.remove('selected'));
}
function maybeCloseSubmit(e) { if (e.target.id === 'submit-overlay') closeSubmit(); }
function submitFeedback() {
  const title = document.getElementById('fb-title').value.trim();
  const desc  = document.getElementById('fb-desc').value.trim();
  const email = document.getElementById('fb-email').value.trim();
  if (!title) { toast('Please enter a title.', 'err'); return; }
  if (!selectedLabel) { toast('Please select a type.', 'err'); return; }
  if (!email || !email.includes('@')) { toast('Please enter a valid email.', 'err'); return; }
  const data = getFeedback();
  data.unshift({ id:'f'+Date.now(), title, description:desc, email, status:'exploring', label:selectedLabel, votes:0, voters:[], createdAt:new Date().toISOString(), adminResponse:null });
  saveFeedback(data);
  closeSubmit();
  render();
  toast("Feedback submitted! We'll review it soon.", 'ok');
}

// ── DETAIL MODAL ───────────────────────────────────────────────────────
function openDetail(id) {
  const data = getFeedback();
  const f = data.find(x => x.id === id);
  if (!f) return;
  const voterId = getVoterId();
  const voted = f.voters.includes(voterId);
  const initial = (f.email || f.title || '?')[0].toUpperCase();
  const colorIdx = (f.email || 'a').charCodeAt(0) % AVATAR_COLORS.length;
  const emailDisplay = f.email ? escHtml(f.email.split('@')[0].replace(/[._]/g,' ')) : 'Anonymous';

  document.getElementById('detail-drawer').innerHTML = `
    <div class="modal-head" style="padding-bottom:14px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div class="fb-avatar-circle" style="width:28px;height:28px;font-size:.75rem;background:${AVATAR_COLORS[colorIdx]}">${initial}</div>
          <span style="font-size:.8rem;color:var(--muted)">${emailDisplay}</span>
          <span style="font-size:.75rem;color:var(--muted);opacity:.6">· ${formatDate(f.createdAt)}</span>
        </div>
        <h2 style="font-size:1.2rem;line-height:1.35;margin-bottom:10px">${escHtml(f.title)}</h2>
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
          ${f.label ? `<span class="label-pill label-pill-${f.label}">${f.label}</span>` : ''}
          <span class="fb-status-pill"><span class="status-dot dot-${f.status}"></span> ${statusLabel(f.status)}</span>
        </div>
      </div>
      <button class="modal-x" onclick="closeDetail()" style="align-self:flex-start;margin-top:2px">✕</button>
    </div>
    <div class="modal-body" style="padding-top:14px">
      ${f.description ? `<p style="color:var(--text);font-size:.9rem;line-height:1.75">${escHtml(f.description)}</p>` : ''}
      ${f.adminResponse ? `
        <div class="admin-response">
          <div class="admin-response-label">🔖 Noorana Team Response</div>
          <p>${escHtml(f.adminResponse)}</p>
        </div>` : ''}
    </div>
    <div class="modal-foot" style="justify-content:flex-start;align-items:center;border-top:1px solid var(--border);padding-top:14px">
      <button class="vote-btn${voted?' voted':''}" onclick="toggleVote('${f.id}')" style="padding:8px 16px;">
        <svg class="heart-icon" style="width:17px;height:17px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>
        <span style="font-size:.95rem;font-weight:700">${f.votes}</span>
        <span style="font-size:.82rem;font-weight:500;color:var(--muted)">${voted?'Liked':'Like this'}</span>
      </button>
    </div>`;

  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }
function maybeCloseDetail(e) { if (e.target.id === 'detail-overlay') closeDetail(); }

// ── TOAST ──────────────────────────────────────────────────────────────
function toast(msg, type) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── INIT ───────────────────────────────────────────────────────────────
migrateStatuses();
initData();
render();
</script>
</body>
</html>
